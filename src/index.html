<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src https://api.rawg.io;" />
  <title>Games Hoarder Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>GAMES HOARDER VIEWER</span>
    </div>
  </div>
  <div class="topbar-center">
    <div class="search-wrap" id="searchWrap" style="display:none">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search your library…" />
    </div>
  </div>
  <div class="topbar-right">
    <div class="view-toggle" id="viewToggle" style="display:none">
      <button class="view-btn active" data-view="grid" title="Grid View">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="view-btn" data-view="list" title="List View">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <button class="view-btn" data-view="sidebar" title="Sidebar View">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>
    <button class="btn-folder" id="btnPickFolder">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      Open Folder
    </button>
  </div>
</header>

<!-- ═══ MAIN CONTENT ═══ -->
<main class="main-content">

  <!-- WELCOME STATE -->
  <div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-glow"></div>
    <div class="welcome-inner">
      <div class="welcome-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="welcome-title">Games Hoarder Viewer</h1>
      <p class="welcome-sub">Your repacked games library, beautifully organized.</p>
      <button class="btn-welcome" id="btnWelcomePick">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Choose Games Folder
      </button>
    </div>
  </div>

  <!-- CONFIRM NAMES MODAL OVERLAY -->
  <div class="overlay" id="confirmOverlay" style="display:none">
    <div class="confirm-modal">
      <div class="confirm-header">
        <h2>Confirm Game Names</h2>
        <p>Review and edit the detected game names before searching.</p>
      </div>
      <div class="confirm-list" id="confirmList"></div>
      <div class="confirm-footer">
        <span class="confirm-count" id="confirmCount"></span>
        <div class="confirm-actions">
          <button class="btn-secondary" id="btnCancelConfirm">Cancel</button>
          <button class="btn-primary" id="btnStartSearch">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
            Search All Games
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- LOADING STATE -->
  <div class="loading-screen" id="loadingScreen" style="display:none">
    <div class="loading-inner">
      <div class="loading-spinner"></div>
      <p class="loading-text" id="loadingText">Fetching game data…</p>
      <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
      <p class="loading-sub" id="loadingSub"></p>
    </div>
  </div>

  <!-- LIBRARY: GRID VIEW -->
  <div class="library-grid view-panel" id="viewGrid" style="display:none">
    <div class="game-grid" id="gameGrid"></div>
  </div>

  <!-- LIBRARY: LIST VIEW -->
  <div class="library-list view-panel" id="viewList" style="display:none">
    <div class="game-list" id="gameList"></div>
  </div>

  <!-- LIBRARY: SIDEBAR VIEW -->
  <div class="library-sidebar view-panel" id="viewSidebar" style="display:none">
    <aside class="sidebar-panel">
      <div class="sidebar-inner" id="sidebarInner"></div>
    </aside>
    <section class="detail-panel" id="detailPanel">
      <div class="detail-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <p>Select a game to see details</p>
      </div>
    </section>
  </div>

</main>

<!-- ═══ GAME DETAIL MODAL ═══ -->
<div class="game-modal-overlay" id="gameModalOverlay" style="display:none">
  <div class="game-modal" id="gameModal">
    <button class="modal-close" id="modalClose">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="modal-hero" id="modalHero"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
